<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home · JAV.guru</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root {
  /* Hallmark Design Principles */
  --font-sans: "Inter", system-ui, -apple-system, sans-serif;
  
  --color-bg: #2d2d2d; /* Deep atmospheric dark */
  --color-bg: oklch(0.18 0.02 260); /* Deep atmospheric dark */
  --color-surface: #3d3d3d; /* Slightly lighter card surface */
  --color-surface: oklch(0.24 0.03 260); /* Slightly lighter card surface */
  --color-surface-hover: #474747;
  --color-surface-hover: oklch(0.28 0.04 260);
  
  --color-border: #595959;
  --color-border: oklch(0.35 0.04 260);
  --color-border-hover: #727272;
  --color-border-hover: oklch(0.45 0.06 260);
  
  --color-text: #f2f2f2;
  --color-text: oklch(0.95 0.01 260);
  --color-text-muted: #b2b2b2;
  --color-text-muted: oklch(0.70 0.02 260);
  
  --color-primary: #a5a5a5; /* Atmospheric blue */
  --color-primary: oklch(0.65 0.15 260); /* Atmospheric blue */
  --color-primary-hover: #bfbfbf;
  --color-primary-hover: oklch(0.75 0.15 260);
  
  --color-success: #b2b2b2; /* Green for 1080p */
  --color-success: oklch(0.70 0.14 150); /* Green for 1080p */
  --color-info: #a5a5a5;    /* Blue for 720p */
  --color-info: oklch(0.65 0.14 240);    /* Blue for 720p */
  --color-warning: #b2b2b2;  /* Orange for 480p */
  --color-warning: oklch(0.70 0.14 60);  /* Orange for 480p */
  --color-danger: #999999;   /* Red for playlist */
  --color-danger: oklch(0.60 0.16 20);   /* Red for playlist */
  
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --color-bg: #f9f9f9;
  --color-bg: oklch(0.98 0.01 260);
  --color-surface: #ffffff;
  --color-surface: oklch(1 0 0);
  --color-surface-hover: #f4f4f4;
  --color-surface-hover: oklch(0.96 0.01 260);
  
  --color-border: #e5e5e5;
  --color-border: oklch(0.90 0.02 260);
  --color-border-hover: #cccccc;
  --color-border-hover: oklch(0.80 0.03 260);
  
  --color-text: #333333;
  --color-text: oklch(0.2 0.02 260);
  --color-text-muted: #666666;
  --color-text-muted: oklch(0.4 0.02 260);
  
  --color-primary: #8c8c8c;
  --color-primary: oklch(0.55 0.15 260);
  --line: rgba(0,0,0,0.1);
  --green: #16a34a;
  --blue: #2563eb;
  --orange: #d97706;
  --red: #dc2626;
  --cyan: #0891b2;
  --pill: #e2e8f0;
  --pill-hover: #cbd5e1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--color-bg);
  background-image: 
    radial-gradient(circle at 15% 50%, #4c4c4c, transparent 25vw),
    radial-gradient(circle at 15% 50%, oklch(0.3 0.08 260 / 0.15), transparent 25vw),
    radial-gradient(circle at 85% 30%, #4c4c4c, transparent 25vw),
    radial-gradient(circle at 85% 30%, oklch(0.3 0.08 200 / 0.15), transparent 25vw);
  background-attachment: fixed;
  color: var(--color-text);
  font-family: var(--font-sans);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: 1400px; margin: auto; padding: 32px 24px; }

nav {
  display: flex; gap: 12px; flex-wrap: wrap;
  align-items: center; margin-bottom: 24px;
}
nav a {
  color: var(--color-text-muted);
  text-decoration: none;
  border: 1px solid var(--color-border);
  padding: 8px 16px;
  border-radius: var(--radius-full);
  background: var(--color-surface);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
}
nav a:hover { 
  color: var(--color-primary); 
  border-color: var(--color-primary); 
}

.top-bar {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 16px; flex-wrap: wrap; margin-bottom: 24px;
}
h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
.meta { color: var(--color-text-muted); font-size: 13px; }

.controls {
  display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  margin-bottom: 24px;
}
.controls input {
  width: min(520px, 100%);
  padding: 12px 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text);
  outline: none;
  font-size: 14px;
  transition: all var(--transition);
}
.controls input:focus { 
  border-color: var(--color-primary); 
  box-shadow: 0 0 0 3px rgba(136,136,136,0.2);
  box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.2);
}
.controls .chip {
  font-size: 13px;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  padding: 8px 16px;
  border-radius: var(--radius-full);
  background: var(--color-surface);
  white-space: nowrap;
}

.pager {
  display: flex; justify-content: center; align-items: center;
  gap: 12px; margin: 32px 0; flex-wrap: wrap;
}
.pager button {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text);
  cursor: pointer;
  transition: all var(--transition);
}
.pager button:hover:not(:disabled) { 
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.pager button:disabled { opacity: 0.5; cursor: not-allowed; }
.pager .pinfo { color: var(--color-text-muted); font-size: 13px; }

/* ---- GRID ---- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
  margin: 24px 0;
}

/* ---- CARD ---- */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  color: var(--color-text);
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
}
.card:hover {
  transform: translateY(-4px);
  border-color: var(--color-border-hover);
  box-shadow: 0 12px 32px rgba(0,0,0,0.2);
  box-shadow: 0 12px 32px oklch(0 0 0 / 0.2);
}

.card-thumb {
  position: relative;
  aspect-ratio: 16/10;
  overflow: hidden;
  cursor: pointer;
  background: #1a1a1a;
  background: oklch(0.1 0 0);
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity var(--transition), transform 0.5s ease;
}
.card-thumb:hover img { 
  opacity: 0.8;
  transform: scale(1.05); 
}
.card-thumb .ph {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--color-primary), var(--color-info));
  opacity: 0.2;
}

.play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--transition); pointer-events: none;
}
.card-thumb:hover .play-overlay { opacity: 1; }
.play-icon {
  width: 56px; height: 56px;
  background: rgba(136,136,136,0.9);
  background: oklch(from var(--color-primary) l c h / 0.9);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  box-shadow: 0 4px 16px oklch(0 0 0 / 0.3);
}
.play-icon::after {
  content: '';
  border-style: solid;
  border-width: 8px 0 8px 14px;
  border-color: transparent transparent transparent white;
  margin-left: 4px;
}

/* ---- PLAYER ---- */
.card-player {
  display: none;
  background: #000;
}
.card-player video { width: 100%; display: block; }
.card-player.active { display: block; }

.card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }

.card-code {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 6px;
  letter-spacing: 0.02em;
  color: var(--color-primary);
}

.card-url {
  font-size: 12px;
  color: var(--color-text-muted);
  word-break: break-all;
  margin-bottom: 12px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

/* ---- PILLS ---- */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.pill {
  padding: 4px 10px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all var(--transition);
  color: #ffffff;
  color: oklch(1 0 0);
  background: var(--color-border);
}
.pill:hover { filter: brightness(1.15); transform: translateY(-1px); }
.pill:active { transform: translateY(0); }

.pill-preview  { background: var(--color-border); color: var(--color-text); }
.pill-1080p    { background: var(--color-success); }
.pill-720p     { background: var(--color-info); }
.pill-480p     { background: var(--color-warning); }
.pill-playlist { background: var(--color-danger); }
.pill-other    { background: var(--color-border); color: var(--color-text); }
.pill-active   { outline: 2px solid var(--color-text); outline-offset: 2px; }

.badges {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
}
.badge {
  font-size: 11px;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  background: var(--color-bg);
}
.badge-stream {
  color: var(--color-success);
  border-color: rgba(136,136,136,0.3);
  border-color: oklch(from var(--color-success) l c h / 0.3);
  background: rgba(136,136,136,0.05);
  background: oklch(from var(--color-success) l c h / 0.05);
}

.card-link {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-muted);
  text-decoration: none;
  margin-top: auto;
  transition: color var(--transition);
}
.card-link:hover { color: var(--color-primary); }

/* ---- MINI PLAYER ---- */
#miniPlayer {
  position: fixed;
  bottom: 24px; right: 24px;
  width: min(360px, calc(100vw - 48px));
  display: none;
  background: #000;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  box-shadow: 0 16px 48px oklch(0 0 0 / 0.5);
  z-index: 1000;
  border: 1px solid var(--color-border);
}
#miniPlayer video { width: 100%; display: block; }
#miniClose {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.6);
  background: oklch(0 0 0 / 0.6);
  backdrop-filter: blur(4px);
  border: none; color: white;
  width: 28px; height: 28px;
  border-radius: 50%; cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
}
#miniClose:hover { background: rgba(0,0,0,0.8); }
#miniClose:hover { background: oklch(0 0 0 / 0.8); }

footer {
  text-align: center;
  color: var(--color-text-muted);
  font-size: 13px;
  padding: 24px 0;
  border-top: 1px solid var(--color-border);
  margin-top: 24px;
}
</style>
</head>
<body>
<div class="wrap">

<nav>
  <a href="index.html">Index</a>
  <a href="home.html">Home</a>
  <a href="codes.html">Codes</a>
  <a href="sitemap.html">Sitemap</a>
  <a href="missav.html">MissAV</a>
</nav>

<div class="top-bar">
  <h1>Home</h1>
  <div class="meta">{{ total }} posts · {{ with_streams }} with streams · Generated {{ generated|e }}</div>
</div>

<div class="controls">
  <input id="q" type="text" placeholder="Filter by URL or code..." autocomplete="off" aria-label="Search videos">
  <div class="chip" id="statusChip">0 items</div>
</div>

<div class="pager">
  <button id="prevBtn">Prev</button>
  <span class="pinfo" id="pageInfo">Page 1</span>
  <button id="nextBtn">Next</button>
</div>

<main><div class="grid" id="grid"></div></main>

<div class="pager">
  <button id="prevBtn2">Prev</button>
  <span class="pinfo" id="pageInfo2">Page 1</span>
  <button id="nextBtn2">Next</button>
</div>

<footer>Click thumbnail to play best stream. Use pills to switch quality.</footer>
</div>

<div id="miniPlayer">
  <button id="miniClose" aria-label="Close mini player">&times;</button>
  <video controls></video>
</div>

<script>
const ITEMS_PER_PAGE = {{ ITEMS_PER_PAGE }};
const IMAGE_PROXY = "https://imgproxy.mrspidyxd.workers.dev/?url=";
const allItems = {{ js_items | safe }};

let filtered = allItems.slice();
let page = 1;

let activeHls = null;
let activeVideo = null;
let activeCard = null;
let miniHls = null;
let miniActive = false;

const grid = document.getElementById('grid');
const q = document.getElementById('q');
const statusChip = document.getElementById('statusChip');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const prevBtn2 = document.getElementById('prevBtn2');
const nextBtn2 = document.getElementById('nextBtn2');
const pageInfo = document.getElementById('pageInfo');
const pageInfo2 = document.getElementById('pageInfo2');

function totalPages() {
  return Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
}
function clampPage() {
  const tp = totalPages();
  if (page < 1) page = 1;
  if (page > tp) page = tp;
}
function escHtml(s) {
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

/* ---- RENDER ---- */

function render() {
  clampPage();
  const tp = totalPages();
  const start = (page - 1) * ITEMS_PER_PAGE;
  const end = start + ITEMS_PER_PAGE;
  const chunk = filtered.slice(start, end);

  statusChip.textContent = `${filtered.length} items (showing ${chunk.length})`;
  pageInfo.textContent = `Page ${page} / ${tp}`;
  pageInfo2.textContent = `Page ${page} / ${tp}`;

  prevBtn.disabled = page <= 1;
  prevBtn2.disabled = page <= 1;
  nextBtn.disabled = page >= tp;
  nextBtn2.disabled = page >= tp;

  grid.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--color-text-muted);font-size:15px;';
    empty.textContent = q.value ? 'No results found for "' + q.value + '"' : 'No results found';
    grid.appendChild(empty);
    return;
  }
  chunk.forEach(it => grid.appendChild(buildCard(it)));
}

/* ---- BUILD CARD ---- */

function buildCard(it) {
  const pageUrl = it.u || '';
  const imgUrl = it.i || '';
  const dateAdded = it.d || '';
  const code = it.c || '';
  const streams = it.s || [];
  const hasStreams = streams.length > 0;

  const card = document.createElement('div');
  card.className = 'card';

  // Thumbnail
  const thumbDiv = document.createElement('div');
  thumbDiv.className = 'card-thumb';
  thumbDiv.tabIndex = 0;
  if (imgUrl) {
    thumbDiv.innerHTML = `<img src="${escHtml(IMAGE_PROXY + encodeURIComponent(imgUrl))}" loading="lazy" alt="${escHtml(code)}" onerror="this.outerHTML='<div class=ph></div>'"><div class="play-overlay"><div class="play-icon"></div></div>`;
  } else {
    thumbDiv.innerHTML = '<div class="ph"></div>';
  }

  // Player area
  const playerDiv = document.createElement('div');
  playerDiv.className = 'card-player';
  const video = document.createElement('video');
  video.controls = true;
  video.playsInline = true;
  video.preload = 'none';
  playerDiv.appendChild(video);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  // Code
  if (code) {
    const codeDiv = document.createElement('div');
    codeDiv.className = 'card-code';
    codeDiv.textContent = code;
    body.appendChild(codeDiv);
  }

  // Stream pills
  if (hasStreams) {
    const pills = document.createElement('div');
    pills.className = 'pills';

    // Preview pill
    const preview = `https://fourhoi.com/${code.toLowerCase()}/preview.mp4`;
    const prevPill = document.createElement('button');
    prevPill.className = 'pill pill-preview';
    prevPill.textContent = 'Preview';
    prevPill.onclick = (e) => { e.stopPropagation(); playSource(card, video, playerDiv, thumbDiv, preview, 'direct', prevPill, pills); };
    pills.appendChild(prevPill);

    // Quality pills sorted: 1080p > 720p > 480p > playlist
    const order = { '1080p':0, '720p':1, '480p':2, 'playlist':3 };
    const sorted = [...streams].sort((a,b) => (order[a.quality]??4) - (order[b.quality]??4));

    for (const e of sorted) {
      const pill = document.createElement('button');
      const qClass = ['1080p','720p','480p','playlist'].includes(e.quality) ? 'pill-'+e.quality : 'pill-other';
      pill.className = 'pill ' + qClass;
      pill.textContent = e.quality || 'stream';
      pill.title = e.source || '';
      pill.onclick = (ev) => { ev.stopPropagation(); playSource(card, video, playerDiv, thumbDiv, e.url, 'hls', pill, pills); };
      pills.appendChild(pill);
    }

    body.appendChild(pills);

    // Thumbnail click -> play best stream
    thumbDiv.onclick = () => {
      const best = streams.find(e => e.quality==='1080p')
                || streams.find(e => e.quality==='720p')
                || streams[0];
      playSource(card, video, playerDiv, thumbDiv, best.url, 'hls', null, body.querySelector('.pills'));
    };
  } else {
    // No streams: thumbnail links to page
    thumbDiv.onclick = () => window.open(pageUrl, '_blank');
    thumbDiv.title = 'Open source page';
  }
  thumbDiv.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); thumbDiv.click(); } };
  // URL display
  const urlDiv = document.createElement('div');
  urlDiv.className = 'card-url';
  urlDiv.textContent = pageUrl;
  body.appendChild(urlDiv);

  // Badges
  const badges = document.createElement('div');
  badges.className = 'badges';

  if (dateAdded) {
    const b = document.createElement('span');
    b.className = 'badge';
    b.textContent = dateAdded;
    badges.appendChild(b);
  }

  if (hasStreams) {
    const b = document.createElement('span');
    b.className = 'badge badge-stream';
    b.textContent = streams.length + ' stream' + (streams.length > 1 ? 's' : '');
    badges.appendChild(b);
  }

  body.appendChild(badges);

  // Source link
  const link = document.createElement('a');
  link.className = 'card-link';
  link.href = pageUrl;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.textContent = 'Open source page';
  link.onclick = (e) => e.stopPropagation();
  body.appendChild(link);

  card.appendChild(thumbDiv);
  card.appendChild(playerDiv);
  card.appendChild(body);
  return card;
}

/* ---- PLAY SOURCE ---- */

function playSource(card, video, playerDiv, thumbDiv, url, type, activePill, pillsContainer) {
  if (activeVideo && activeVideo !== video) {
    stopVideo(activeVideo);
  }
  closeMini();

  if (pillsContainer) {
    pillsContainer.querySelectorAll('.pill').forEach(p => p.classList.remove('pill-active'));
  }
  if (activePill) activePill.classList.add('pill-active');

  if (activeHls) { activeHls.destroy(); activeHls = null; }

  playerDiv.classList.add('active');
  thumbDiv.style.display = 'none';

  if (type === 'hls' && url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      const hls = new Hls({ enableWorker:true, lowLatencyMode:false });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          hls.destroy();
          video.src = url;
          video.play().catch(()=>{});
        }
      });
      activeHls = hls;
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(()=>{});
    }
  } else {
    video.src = url;
    video.play().catch(()=>{});
  }

  activeVideo = video;
  activeCard = card;
}

function stopVideo(video) {
  video.pause();
  video.removeAttribute('src');
  video.load();
  const card = video.closest('.card');
  if (card) {
    const pd = card.querySelector('.card-player');
    const td = card.querySelector('.card-thumb');
    if (pd) pd.classList.remove('active');
    if (td) td.style.display = '';
    card.querySelectorAll('.pill-active').forEach(p => p.classList.remove('pill-active'));
  }
}

/* ---- MINI PLAYER ---- */

const miniEl = document.getElementById('miniPlayer');
const miniVideo = miniEl.querySelector('video');
document.getElementById('miniClose').onclick = closeMini;

function closeMini() {
  if (miniHls) { miniHls.destroy(); miniHls = null; }
  miniVideo.pause();
  miniVideo.removeAttribute('src');
  miniEl.style.display = 'none';
  miniActive = false;
}

window.addEventListener('scroll', () => {
  if (!activeVideo || !activeCard) return;
  const rect = activeCard.getBoundingClientRect();
  const offscreen = rect.bottom < -50 || rect.top > window.innerHeight + 50;

  if (offscreen && !miniActive) {
    miniActive = true;
    miniEl.style.display = 'block';
    if (activeHls) {
      if (miniHls) miniHls.destroy();
      const src = activeHls.url;
      miniHls = new Hls({ enableWorker:true });
      miniHls.loadSource(src);
      miniHls.attachMedia(miniVideo);
      miniHls.on(Hls.Events.MANIFEST_PARSED, () => {
        miniVideo.currentTime = activeVideo.currentTime;
        miniVideo.play().catch(()=>{});
      });
    } else {
      miniVideo.src = activeVideo.src;
      miniVideo.currentTime = activeVideo.currentTime;
      miniVideo.play().catch(()=>{});
    }
    activeVideo.pause();
  } else if (!offscreen && miniActive) {
    activeVideo.currentTime = miniVideo.currentTime;
    activeVideo.play().catch(()=>{});
    closeMini();
  }
}, { passive:true });

/* ---- FILTER + PAGER ---- */

function applyFilter() {
  const term = (q.value || '').trim().toLowerCase();
  filtered = !term
    ? allItems.slice()
    : allItems.filter(it => {
        const hay = (it.u + ' ' + it.c).toLowerCase();
        return hay.includes(term);
      });
  page = 1;
  render();
}

prevBtn.addEventListener('click', () => { page--; render(); });
nextBtn.addEventListener('click', () => { page++; render(); });
prevBtn2.addEventListener('click', () => { page--; render(); });
nextBtn2.addEventListener('click', () => { page++; render(); });

let __t;
q.addEventListener('input', () => {
  window.clearTimeout(__t);
  __t = window.setTimeout(applyFilter, 150);
});

render();
</script>

<script>
  (function(){
    const toggle = document.createElement('button');
    toggle.innerHTML = '🌓';
    toggle.title = 'Toggle Theme';
    toggle.setAttribute('aria-label', 'Toggle theme');
    toggle.style.cssText = 'position:fixed;bottom:24px;left:24px;z-index:9999;background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text);padding:12px;border-radius:50%;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform var(--transition);';
    toggle.onmouseover = () => toggle.style.transform = 'scale(1.1)';
    toggle.onmouseout = () => toggle.style.transform = 'scale(1)';
    toggle.onclick = () => {
      const isLight = document.body.getAttribute('data-theme') === 'light';
      document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
      localStorage.setItem('theme', isLight ? 'dark' : 'light');
    };
    document.body.appendChild(toggle);
    if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
  })();
</script>
