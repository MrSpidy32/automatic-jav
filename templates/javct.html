{% extends "base.html" %}
{% block title %}JavCT · JAV.guru{% endblock %}
{% block head_extra %}{% endblock %}
{% block content %}
<div class="top-bar">
  <h1><span style="color:var(--color-accent)">JavCT</span> · JAV.guru</h1>
  <div class="meta" id="stats"></div>
</div>

<div class="controls">
  <input id="filter" type="text" placeholder="Search by code, title..." autocomplete="off" aria-label="Search videos">
</div>

<div id="loading" class="loading">Loading data...</div>
<div id="container" class="vgrid"></div>
{% endblock %}

{% block body_extra %}
<script>
let DATA = [];

fetch("javct.json")
  .then(r => r.json())
  .then(data => {
    DATA = data;
    document.getElementById("loading").style.display = "none";
    updateStats(data.length);
    initVirtual();
  })
  .catch(() => {
    document.getElementById("loading").textContent = "Failed to load data.";
  });

function updateStats(shown) {
  document.getElementById("stats").innerHTML =
    `<b>${shown.toLocaleString()}</b> / ${DATA.length.toLocaleString()} videos`;
}

function initVirtual() {
  const container = document.getElementById("container");
  const rowHeight = 320;
  const buffer = 4;
  let lastQ = "";
  let filtered = DATA;

  function refilter() {
    const q = document.getElementById("filter").value.toLowerCase().trim();
    if (q !== lastQ) {
      lastQ = q;
      filtered = q ? DATA.filter(v => {
        return v.code.toLowerCase().includes(q)
          || (v.title || "").toLowerCase().includes(q)
          || (v.source_tag || "").includes(q);
      }) : DATA;
      updateStats(filtered.length);
    }
    return filtered;
  }

  function render() {
    const items = refilter();
    const scrollTop = window.scrollY;
    const screenH = window.innerHeight;
    const cols = getCols();
    const totalRows = Math.ceil(items.length / cols);

    const startRow = Math.max(0, Math.floor(scrollTop / rowHeight) - buffer);
    const endRow = Math.min(totalRows, Math.ceil((scrollTop + screenH) / rowHeight) + buffer);

    const si = startRow * cols;
    const ei = Math.min(items.length, endRow * cols);

    container.innerHTML = "";
    if (items.length === 0) {
      const empty = document.createElement("div");
      empty.style.cssText = "grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--color-text-dim);font-size:15px;";
      const q = document.getElementById("filter").value;
      empty.textContent = q ? 'No results found for "' + q + '"' : "No results found";
      container.appendChild(empty);
      return;
    }
    for (let i = si; i < ei; i++) {
      container.appendChild(buildCard(items[i]));
    }

    container.style.paddingTop  = startRow * rowHeight + "px";
    container.style.paddingBottom = Math.max(0, totalRows - endRow) * rowHeight + "px";
  }

  function getCols() {
    const w = window.innerWidth;
    if (w >= 1400) return 5;
    if (w >= 1024) return 4;
    if (w >= 640)  return 3;
    return 2;
  }

  let ticking = false;
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(() => { render(); ticking = false; }); }
  }

  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", render);
  document.getElementById("filter").oninput = render;
  render();
}

function buildCard(v) {
  const card = document.createElement("div");
  card.className = "card";

  const thumbDiv = document.createElement("a");
  thumbDiv.className = "card-thumb";
  thumbDiv.href = v.page_url;
  thumbDiv.target = "_blank";
  thumbDiv.rel = "noopener";

  if (v.image_url) {
    const img = document.createElement("img");
    img.loading = "lazy";
    img.alt = v.code;
    img.src = v.image_url;
    img.onerror = function() { this.style.display = "none"; };
    thumbDiv.appendChild(img);
  }

  if (v.views) {
    const vBadge = document.createElement("span");
    vBadge.className = "badge";
    vBadge.style.cssText = "position:absolute;top:8px;right:8px;background:oklch(0 0 0 / 0.7);color:var(--color-accent);backdrop-filter:blur(4px);";
    vBadge.textContent = "👁 " + v.views;
    thumbDiv.appendChild(vBadge);
  }

  const body = document.createElement("div");
  body.className = "card-body";

  const codeDiv = document.createElement("div");
  codeDiv.className = "card-code";
  codeDiv.textContent = v.code.toUpperCase();

  if (v.source_tag) {
    const tag = document.createElement("span");
    tag.className = v.source_tag === "jav.guru" ? "tag tag-guru" : "tag tag-cat";
    tag.textContent = v.source_tag === "jav.guru" ? "JAV.guru" : "New";
    codeDiv.appendChild(tag);
  }
  body.appendChild(codeDiv);

  if (v.title) {
    const titleDiv = document.createElement("div");
    titleDiv.className = "card-url";
    titleDiv.textContent = v.title;
    titleDiv.title = v.title;
    body.appendChild(titleDiv);
  }

  if (v.page_url) {
    const btn = document.createElement("a");
    btn.style.cssText = "display:inline-flex;align-items:center;gap:6px;margin-top:auto;padding:8px 16px;background:var(--color-accent);color:white;font-size:12px;font-weight:700;border:none;border-radius:var(--radius-md);cursor:pointer;text-decoration:none;transition:filter var(--transition);justify-content:center;";
    btn.href = v.page_url;
    btn.target = "_blank";
    btn.rel = "noopener";
    btn.textContent = "▶ Watch Online";
    btn.onmouseover = () => btn.style.filter = "brightness(1.15)";
    btn.onmouseout = () => btn.style.filter = "";
    body.appendChild(btn);
  }

  card.appendChild(thumbDiv);
  card.appendChild(body);
  return card;
}
</script>
{% endblock %}
