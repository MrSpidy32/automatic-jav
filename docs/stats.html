<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stats Dashboard · JAV.guru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
  box-shadow: var(--shadow-card);
}
.stat-val {
  font-size: 30px;
  font-weight: 700;
  color: var(--color-accent);
  margin-bottom: 4px;
}
.stat-lbl {
  font-size: 13px;
  color: var(--color-text-dim);
}
.chart-box {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-card);
}
</style>

<style>
:root {
  --font-sans: "Inter", system-ui, -apple-system, sans-serif;

  --color-bg: oklch(0.13 0.01 260);
  --color-surface: oklch(0.17 0.015 260);
  --color-surface-2: oklch(0.21 0.02 260);
  --color-border: oklch(0.25 0.025 260);
  --color-text: oklch(0.93 0.01 260);
  --color-text-dim: oklch(0.55 0.02 260);
  --color-accent: oklch(0.65 0.18 250);
  --color-accent-hover: oklch(0.7 0.18 250);

  --color-success: oklch(0.70 0.14 150);
  --color-info: oklch(0.65 0.14 240);
  --color-warning: oklch(0.70 0.14 60);
  --color-danger: oklch(0.60 0.16 20);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow-card: 0 1px 3px oklch(0 0 0 / 0.1), 0 1px 2px oklch(0 0 0 / 0.06);
  --shadow-elevated: 0 10px 25px oklch(0 0 0 / 0.15), 0 4px 10px oklch(0 0 0 / 0.1);
}

[data-theme="light"] {
  --color-bg: oklch(0.98 0.005 260);
  --color-surface: oklch(1 0 0);
  --color-surface-2: oklch(0.95 0.01 260);
  --color-border: oklch(0.88 0.015 260);
  --color-text: oklch(0.15 0.015 260);
  --color-text-dim: oklch(0.45 0.02 260);
  --color-accent: oklch(0.55 0.18 250);
  --color-accent-hover: oklch(0.5 0.18 250);

  --color-success: oklch(0.55 0.18 150);
  --color-info: oklch(0.50 0.18 240);
  --color-warning: oklch(0.60 0.18 60);
  --color-danger: oklch(0.55 0.20 20);

  --shadow-card: 0 1px 3px oklch(0 0 0 / 0.08), 0 1px 2px oklch(0 0 0 / 0.04);
  --shadow-elevated: 0 10px 25px oklch(0 0 0 / 0.1), 0 4px 10px oklch(0 0 0 / 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  background-color: var(--color-bg);
  background-image:
    radial-gradient(circle at 15% 50%, oklch(0.3 0.08 260 / 0.12), transparent 25vw),
    radial-gradient(circle at 85% 30%, oklch(0.3 0.08 200 / 0.12), transparent 25vw);
  background-attachment: fixed;
  color: var(--color-text);
  font-family: var(--font-sans);
  line-height: 1.6;
  min-height: 100vh;
}

.wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.wrap > main { flex: 1; }

/* ---- NAV ---- */
.nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--color-border);
}
.nav a {
  color: var(--color-text-dim);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
  border: 1px solid transparent;
}
.nav a:hover {
  color: var(--color-accent);
  border-color: var(--color-accent);
  background: oklch(from var(--color-accent) l c h / 0.08);
}
.nav a.active {
  color: var(--color-accent);
  border-color: var(--color-accent);
  background: oklch(from var(--color-accent) l c h / 0.12);
}

/* ---- HEADER ---- */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.025em;
}
.meta {
  color: var(--color-text-dim);
  font-size: 13px;
}

/* ---- CONTROLS ---- */
.controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 20px;
}
.controls input {
  width: min(480px, 100%);
  padding: 10px 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text);
  outline: none;
  font-size: 14px;
  transition: all var(--transition);
}
.controls input:focus {
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px oklch(from var(--color-accent) l c h / 0.15);
}
.controls input::placeholder { color: var(--color-text-dim); opacity: 0.6; }
.controls .chip {
  font-size: 13px;
  color: var(--color-text-dim);
  border: 1px solid var(--color-border);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  background: var(--color-surface);
  white-space: nowrap;
}

/* ---- PAGER ---- */
.pager {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin: 28px 0;
  flex-wrap: wrap;
}
.pager button {
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text);
  cursor: pointer;
  transition: all var(--transition);
}
.pager button:hover:not(:disabled) {
  border-color: var(--color-accent);
  color: var(--color-accent);
}
.pager button:disabled { opacity: 0.4; cursor: not-allowed; }
.pager .pinfo { color: var(--color-text-dim); font-size: 13px; }

/* ---- GRID ---- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin: 20px 0;
}

/* ---- CARD ---- */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  color: var(--color-text);
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.card:hover {
  transform: translateY(-3px);
  border-color: oklch(from var(--color-accent) l c h / 0.3);
  box-shadow: var(--shadow-elevated);
}

.card-thumb {
  position: relative;
  aspect-ratio: 16/10;
  overflow: hidden;
  cursor: pointer;
  background: oklch(0.1 0 0);
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity var(--transition), transform 0.5s ease;
}
.card-thumb:hover img {
  opacity: 0.75;
  transform: scale(1.05);
}
.card-thumb .ph {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--color-accent), var(--color-info));
  opacity: 0.15;
}

.play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--transition); pointer-events: none;
}
.card-thumb:hover .play-overlay { opacity: 1; }
.play-icon {
  width: 52px; height: 52px;
  background: oklch(from var(--color-accent) l c h / 0.85);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px oklch(0 0 0 / 0.3);
}
.play-icon::after {
  content: '';
  border-style: solid;
  border-width: 8px 0 8px 14px;
  border-color: transparent transparent transparent white;
  margin-left: 4px;
}

.card-player {
  display: none;
  background: #000;
}
.card-player video { width: 100%; display: block; }
.card-player.active { display: block; }

.card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }

.card-code {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 6px;
  letter-spacing: 0.02em;
  color: var(--color-accent);
}

.card-url {
  font-size: 12px;
  color: var(--color-text-dim);
  word-break: break-all;
  margin-bottom: 12px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

/* ---- PILLS ---- */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.pill {
  padding: 4px 10px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all var(--transition);
  color: oklch(1 0 0);
}
.pill:hover { filter: brightness(1.15); transform: translateY(-1px); }
.pill:active { transform: translateY(0); }

.pill-preview  { background: var(--color-surface-2); color: var(--color-text); }
.pill-1080p    { background: var(--color-success); }
.pill-720p     { background: var(--color-info); }
.pill-480p     { background: var(--color-warning); }
.pill-playlist { background: var(--color-danger); }
.pill-other    { background: var(--color-surface-2); color: var(--color-text); }
.pill-active   { outline: 2px solid var(--color-text); outline-offset: 2px; }

.badges {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
}
.badge {
  font-size: 11px;
  color: var(--color-text-dim);
  border: 1px solid var(--color-border);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  background: var(--color-bg);
}
.badge-stream {
  color: var(--color-success);
  border-color: oklch(from var(--color-success) l c h / 0.3);
  background: oklch(from var(--color-success) l c h / 0.06);
}

.card-link {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-dim);
  text-decoration: none;
  margin-top: auto;
  transition: color var(--transition);
}
.card-link:hover { color: var(--color-accent); }

/* ---- MINI PLAYER ---- */
#miniPlayer {
  position: fixed;
  bottom: 24px; right: 24px;
  width: min(360px, calc(100vw - 48px));
  display: none;
  background: #000;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: 0 16px 48px oklch(0 0 0 / 0.5);
  z-index: 1000;
  border: 1px solid var(--color-border);
}
#miniPlayer video { width: 100%; display: block; }
#miniClose {
  position: absolute; top: 8px; right: 8px;
  background: oklch(0 0 0 / 0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border: none; color: white;
  width: 28px; height: 28px;
  border-radius: 50%; cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
  z-index: 1;
}
#miniClose:hover { background: oklch(0 0 0 / 0.8); }

/* ---- THEME TOGGLE ---- */
#themeToggle {
  position: fixed;
  bottom: 24px; left: 24px;
  z-index: 9999;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text);
  width: 44px; height: 44px;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: var(--shadow-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: transform var(--transition);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#themeToggle:hover { transform: scale(1.1); }

/* ---- FOOTER ---- */
footer {
  text-align: center;
  color: var(--color-text-dim);
  font-size: 13px;
  padding: 24px 0;
  border-top: 1px solid var(--color-border);
  margin-top: 32px;
}

/* ---- LOADING SPINNER ---- */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-text-dim);
  font-size: 15px;
}
.loading::before {
  content: '';
  display: block;
  width: 32px;
  height: 32px;
  border: 3px solid var(--color-border);
  border-top-color: var(--color-accent);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .wrap { padding: 16px 12px; }
  .nav { gap: 6px; margin-bottom: 20px; padding-bottom: 16px; }
  .nav a { padding: 5px 10px; font-size: 12px; }
  h1 { font-size: 19px; }
  .grid { gap: 14px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  #miniPlayer { bottom: 16px; right: 16px; width: min(300px, calc(100vw - 32px)); }
  #themeToggle { bottom: 16px; left: 16px; width: 40px; height: 40px; font-size: 18px; }
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
  .top-bar { flex-direction: column; align-items: flex-start; }
  .controls input { width: 100%; }
}

/* ---- TAG PILLS (missav/onejav/javct) ---- */
.tag {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.tag-guru {
  background: oklch(0.6 0.12 240 / 0.15);
  color: oklch(0.7 0.15 240);
  border: 1px solid oklch(0.6 0.12 240 / 0.3);
}
.tag-cat, .tag-new {
  background: oklch(0.6 0.15 300 / 0.15);
  color: oklch(0.7 0.15 300);
  border: 1px solid oklch(0.6 0.15 300 / 0.3);
}

/* ---- VIRTUAL SCROLL GRID (generic) ---- */
.vgrid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (min-width: 640px)  { .vgrid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1024px) { .vgrid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 1400px) { .vgrid { grid-template-columns: repeat(5, 1fr); } }

.vgrid-square {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (min-width: 480px)  { .vgrid-square { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 768px)  { .vgrid-square { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 1024px) { .vgrid-square { grid-template-columns: repeat(5, 1fr); } }
@media (min-width: 1400px) { .vgrid-square { grid-template-columns: repeat(6, 1fr); } }
</style>
</head>

<script>
/* ---- SHARED UTILITIES ---- */

let activeHls = null;
let activeVideo = null;
let activeCard = null;
let miniHls = null;
let miniActive = false;

function escHtml(s) {
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

/* ---- HLS PLAYER ---- */

function playSource(card, video, playerDiv, thumbDiv, url, type, activePill, pillsContainer) {
  if (activeVideo && activeVideo !== video) {
    stopVideo(activeVideo);
  }
  closeMini();

  if (pillsContainer) {
    pillsContainer.querySelectorAll('.pill').forEach(p => p.classList.remove('pill-active'));
  }
  if (activePill) activePill.classList.add('pill-active');

  if (activeHls) { activeHls.destroy(); activeHls = null; }

  playerDiv.classList.add('active');
  thumbDiv.style.display = 'none';

  if (type === 'hls' && url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      const hls = new Hls({ enableWorker: true, lowLatencyMode: false });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          hls.destroy();
          video.src = url;
          video.play().catch(() => {});
        }
      });
      activeHls = hls;
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(() => {});
    }
  } else {
    video.src = url;
    video.play().catch(() => {});
  }

  activeVideo = video;
  activeCard = card;
}

function stopVideo(video) {
  video.pause();
  video.removeAttribute('src');
  video.load();
  const card = video.closest('.card');
  if (card) {
    const pd = card.querySelector('.card-player');
    const td = card.querySelector('.card-thumb');
    if (pd) pd.classList.remove('active');
    if (td) td.style.display = '';
    card.querySelectorAll('.pill-active').forEach(p => p.classList.remove('pill-active'));
  }
}

/* ---- MINI PLAYER ---- */

const miniEl = document.getElementById('miniPlayer');
const miniVideo = miniEl.querySelector('video');
document.getElementById('miniClose').onclick = closeMini;

function closeMini() {
  if (miniHls) { miniHls.destroy(); miniHls = null; }
  miniVideo.pause();
  miniVideo.removeAttribute('src');
  miniEl.style.display = 'none';
  miniActive = false;
}

/* Scroll-based mini player activation */
window.addEventListener('scroll', () => {
  if (!activeVideo || !activeCard) return;
  const rect = activeCard.getBoundingClientRect();
  const offscreen = rect.bottom < -50 || rect.top > window.innerHeight + 50;

  if (offscreen && !miniActive) {
    miniActive = true;
    miniEl.style.display = 'block';
    if (activeHls) {
      if (miniHls) miniHls.destroy();
      const src = activeHls.url;
      miniHls = new Hls({ enableWorker: true });
      miniHls.loadSource(src);
      miniHls.attachMedia(miniVideo);
      miniHls.on(Hls.Events.MANIFEST_PARSED, () => {
        miniVideo.currentTime = activeVideo.currentTime;
        miniVideo.play().catch(() => {});
      });
    } else {
      miniVideo.src = activeVideo.src;
      miniVideo.currentTime = activeVideo.currentTime;
      miniVideo.play().catch(() => {});
    }
    activeVideo.pause();
  } else if (!offscreen && miniActive) {
    activeVideo.currentTime = miniVideo.currentTime;
    activeVideo.play().catch(() => {});
    closeMini();
  }
}, { passive: true });

/* ---- THEME TOGGLE ---- */

(function() {
  const toggle = document.getElementById('themeToggle');
  toggle.onclick = () => {
    const isLight = document.body.getAttribute('data-theme') === 'light';
    document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
    localStorage.setItem('theme', isLight ? 'dark' : 'light');
  };
  if (localStorage.getItem('theme') === 'light') {
    document.body.setAttribute('data-theme', 'light');
  }
})();
</script>


<script>
fetch("stats.json")
  .then(r => r.json())
  .then(data => {
    const kpi = document.getElementById('kpi');
    for (const [src, val] of Object.entries(data.sources)) {
      kpi.innerHTML += '<div class="stat-card"><div class="stat-val">' + Number(val).toLocaleString() + '</div><div class="stat-lbl">' + escHtml(src) + ' Videos</div></div>';
    }

    const dates = Object.keys(data.timeline).sort();
    const counts = dates.map(d => data.timeline[d]);
    new Chart(document.getElementById('timelineChart'), {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          label: 'JAV.guru Videos Added',
          data: counts,
          borderColor: 'oklch(0.65 0.18 250)',
          backgroundColor: 'oklch(0.65 0.18 250 / 0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: { display: true, text: 'Growth Over Time', color: 'var(--color-text)' }
        },
        scales: {
          x: { ticks: { color: 'var(--color-text-dim)' } },
          y: { ticks: { color: 'var(--color-text-dim)' } }
        }
      }
    });

    new Chart(document.getElementById('sourceChart'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(data.sources),
        datasets: [{
          data: Object.values(data.sources),
          backgroundColor: [
            'oklch(0.65 0.18 250)',
            'oklch(0.65 0.18 300)',
            'oklch(0.65 0.18 190)',
            'oklch(0.65 0.18 150)',
            'oklch(0.65 0.18 340)'
          ]
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: { display: true, text: 'Source Breakdown', color: 'var(--color-text)' }
        }
      }
    });
  });
</script>

</body>
